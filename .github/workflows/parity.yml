name: parity

on:
  push:
    branches: ["**"]
  pull_request:

# Least-privilege GITHUB_TOKEN: this workflow only reads the repo and runs checks.
permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (not mutable tags); Renovate keeps them current.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # The tooling scripts run via tsx (ADR 0039), so the parity job needs Node + deps like app.yml.
      # setup-node MUST be SHA-pinned (same SHA as app.yml) or the action-pin guard reddens on its own
      # workflow.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The upstream ai-config self-tests live in its test/ tree, which is deliberately not vendored
      # into a Host App (ai-config-sync skips it) — this host runs only the checks it ships.
      - name: Enforce-hook self-test (Layer 3 Claude fast-fail; needs jq)
        run: bash .claude/hooks/enforce-branch-creation.test.sh

      # Drives the real summon script against a fake `codex` in a temp dir, so it needs no CLI, no
      # credentials, and no network — the script itself never touches either (issue #39).
      - name: Reviewer-summon self-test (Reviewer wiring; offline, fake CLI)
        run: bash scripts/summon_reviewer.test.sh

      - name: Structural parity check
        run: npx tsx scripts/parity-check.ts

      # Supply-chain guard: fail if any workflow reintroduces an unpinned external
      # `uses:` (mutable tag/branch) instead of a full commit SHA (issue #59).
      - name: Action-pin guard self-test (offline, fixtures)
        run: bash scripts/check_action_pins.test.sh

      - name: Action-pin guard (external actions must be SHA-pinned)
        run: npx tsx scripts/check-action-pins.ts
