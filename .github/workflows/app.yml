name: App

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN: this workflow only reads the repo and runs checks.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to full commit SHAs (not mutable tags) to close the
      # tag-repointing supply-chain vector; Renovate keeps the SHAs current.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Dependency audit (runtime deps)
        run: npm run audit
